      max-pool-prepared-statement-per-connection-size: 20
      use-global-data-source-stat: true
      # ??connectProperties?????mergeSql????SQL??
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=500

  # ??redis??
  redis:
    host: 192.168.32.129
    port: 6379
    timeout: 10
    lettuce:
      pool:
        max-active: 1000
        max-idle: 500
        max-wait: 500

  # ??RabbitMQ??
  rabbitmq:
    host: 192.168.32.129
    port: 5672
    username: mnsx
    password: 123123
    virtual-host: center
    listener:
      simple:
        concurrency: 10
        max-concurrency: 10
        prefetch: 1
        auto-startup: true
        default-requeue-rejected: true
