spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.169.32.129:3306/sks?useUnicode=true&characterEncoding=UTF-8&useSSL=false
    username: root
    password: 123123
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      max-active: 1000
      initial-size: 100
      max-wait: 60000
      min-idle: 500
      # ???????????????????????????????
